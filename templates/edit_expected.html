<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultSync | Edit Planned Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dashboard-body min-h-screen bg-gray-100">
    <main class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 p-4 md:p-8">
        <div class="max-w-2xl mx-auto">
            <a href="{{ next_url }}" class="inline-flex items-center gap-2 text-blue-600 font-semibold mb-6">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>Back
            </a>

            <section class="bg-white rounded-xl md:rounded-2xl shadow-md p-6 md:p-8 border border-gray-100">
                <div class="flex items-start gap-3 mb-6">
                    <div class="bg-teal-100 rounded-full p-3">
                        <i class="fas fa-calendar-check text-teal-600" aria-hidden="true"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800">Edit Planned Expense</h1>
                        <p class="text-sm text-slate-500 mt-1">Update amount, timing, category, and billing details.</p>
                        {% if planned.is_paid %}
                        <p class="text-xs text-green-600 font-semibold mt-2">Already posted; linked actual expense will update too.</p>
                        {% endif %}
                    </div>
                </div>

                <form method="POST" class="space-y-4">
                    <input type="hidden" name="next" value="{{ next_url }}">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Name</label>
                        <input type="text" name="name" value="{{ planned.name }}" class="form-input w-full border-2 border-gray-200 rounded-lg p-3 text-sm" required>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Amount</label>
                            <input type="number" name="amount" value="{{ planned.amount }}" min="0.01" step="0.01" class="form-input w-full border-2 border-gray-200 rounded-lg p-3 text-sm" required>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Due Day</label>
                            <input type="number" name="due_day" value="{{ planned.due_day }}" min="1" max="31" class="form-input w-full border-2 border-gray-200 rounded-lg p-3 text-sm" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Category</label>
                        <select name="category_id" class="form-input w-full border-2 border-gray-200 rounded-lg p-3 text-sm" required>
                            {% for category in categories %}
                            <option value="{{ category.id }}" {% if category.id == planned.category_id %}selected{% endif %}>{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Month</label>
                            <select name="month" class="form-input w-full border-2 border-gray-200 rounded-lg p-3 text-sm" required>
                                {% for m in range(1, 13) %}
                                <option value="{{ m }}" {% if m == planned.month %}selected{% endif %}>{{ m }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Year</label>
                            <select name="year" class="form-input w-full border-2 border-gray-200 rounded-lg p-3 text-sm" required>
                                {% for y in year_range %}
                                <option value="{{ y }}" {% if y == planned.year %}selected{% endif %}>{{ y }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700">
                        Save Planned Expense
                    </button>
                </form>
            </section>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
